services:
  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock-local
    ports:
      - "8083:8083"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    command: --global-response-templating --verbose --port 8083
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/__admin/mappings"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 0s
      start_interval: 1s
