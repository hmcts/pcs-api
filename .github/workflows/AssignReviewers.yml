name: 'Auto Assign'
on:
  pull_request:
    types: [labeled]
    # types: [opened, ready_for_review]

jobs:
  add-dev-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.1
        with:
          configuration-path: '.github/auto_assign_dev.yml'
  
