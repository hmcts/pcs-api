name: 'Auto Assign'
on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  add-dev-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.1
        with:
          configuration-path: '.github/auto_assign_dev.yml'
  
  add-qa-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.1
        with:
          configuration-path: '.github/auto_assign_qa.yml'
  
  notify-slack:
      needs: [add-dev-reviews,add-qa-reviews]
      runs-on: ubuntu-latest
      steps:
        - name: Get assigned reviewers
          id: reviewers
          run: |
            reviewers=$(gh pr view ${{ github.event.pull_request.number }} --json reviewRequests --jq '.reviewRequests[].login')
            echo "reviewers=$reviewers" >> $GITHUB_OUTPUT
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
        - name: Build Slack mentions
          id: slack_mentions
          run: |
            curl -s https://raw.githubusercontent.com/hmcts/github-slack-user-mappings/master/slack.json -o mapping.json
            mentions=""
            for github_user in ${{ steps.reviewers.outputs.reviewers }}; do
              slack_id=$(jq -r --arg user "$github_user" '.users[] | select(.github == $user) | .slack' mapping.json)
              if [ -n "$slack_id" ]; then
                mentions="$mentions <@$slack_id>"
              fi
            done
            echo "mentions=$mentions" >> $GITHUB_OUTPUT
  
        - uses: slackapi/slack-github-action@v2
          with:
            webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
            webhook-type: incoming-webhook
            payload: |
              text: "Reviewers assigned to ${{ github.event.pull_request.html_url }}: ${{ steps.slack_mentions.outputs.mentions }}"
